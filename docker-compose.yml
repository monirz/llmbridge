services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "qwen2.5:3b"]
    restart: "no"

  bifrost:
    image: maximhq/bifrost:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/data/config.json:ro
      - bifrost_data:/app/data
    environment:
      - APP_HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  llmbridge:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./provider_config.yaml:/app/provider_config.yaml
    environment:
      - BIFROST_URL=http://bifrost:8080/v1/chat/completions
      - MODEL=${MODEL:-}
    depends_on:
      - bifrost
    restart: unless-stopped

volumes:
  ollama_data:
  bifrost_data:
