services:
  # ── Ollama (local model) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - MODEL=${MODEL:-}
    entrypoint: ["/bin/sh", "-c", "case \"$MODEL\" in ollama/*|\"\") /bin/ollama serve ;; *) exit 0 ;; esac"]
    restart: on-failure

  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL=${MODEL:-}
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c", "case \"$MODEL\" in ollama/*|\"\") until ollama list 2>/dev/null; do sleep 2; done && ollama pull ${MODEL:-qwen2.5:3b} ;; *) exit 0 ;; esac"]
    restart: "no"

  # ── Bifrost AI gateway ──────────────────────────────────────────────────────
  bifrost:
    image: maximhq/bifrost:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/data/config.json:ro
      - bifrost_data:/app/data
    environment:
      - APP_HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  # ── LLMBridge app ───────────────────────────────────────────────────────────
  llmbridge:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./provider_config.yaml:/app/provider_config.yaml
    environment:
      - BIFROST_URL=http://bifrost:8080/v1/chat/completions
      - MODEL=${MODEL:-}
      - LAGO_URL=http://lago-api:3000
      - LAGO_API_KEY=${LAGO_API_KEY:-llmbridge-lago-dev-key}
    depends_on:
      bifrost:
        condition: service_started
      lago-api:
        condition: service_healthy
    restart: unless-stopped

  # ── Lago billing (postgres + redis + api + worker + clock + front) ──────────
  lago-db:
    image: getlago/postgres-partman:latest
    environment:
      POSTGRES_DB: lago
      POSTGRES_USER: lago
      POSTGRES_PASSWORD: lago
    volumes:
      - lago_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lago"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  lago-redis:
    image: redis:7-alpine
    volumes:
      - lago_redis:/data
    restart: unless-stopped

  lago-migrate:
    image: getlago/api:v1.46.0
    command: ["./scripts/migrate.sh"]
    environment: &lago-env
      DATABASE_URL: postgresql://lago:lago@lago-db:5432/lago
      REDIS_URL: redis://lago-redis:6379
      LAGO_API_URL: http://localhost:3000
      LAGO_FRONT_URL: http://localhost:8081
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "48bab14e4a1d13748b38025ff8306a2f8dd0a2d78cd813dca8f3fe2ed97f24ef7dd3e0da127c142f2bb9ab00b1d35dcb56764d9f3238edc10a4b7da8f9eff8ce"
      LAGO_RSA_PRIVATE_KEY: ""
      LAGO_ENCRYPTION_PRIMARY_KEY: "ada4a3bfeb0b2bc394dfdc4c26a136ac"
      LAGO_ENCRYPTION_DETERMINISTIC_KEY: "dc76be805d87db6b99afd8df797dab2c"
      LAGO_ENCRYPTION_KEY_DERIVATION_SALT: "72d58e241d7fe418e95b0cfdbcfb2875"
      LAGO_DISABLE_SEGMENT: "true"
      LAGO_DISABLE_PDF_GENERATION: "true"
      LAGO_CREATE_ORG: "true"
      LAGO_ORG_NAME: "LLMBridge"
      LAGO_ORG_USER_EMAIL: "admin@llmbridge.local"
      LAGO_ORG_USER_PASSWORD: "password"
      LAGO_ORG_API_KEY: "llmbridge-lago-dev-key"
    depends_on:
      lago-db:
        condition: service_healthy
    restart: "no"

  lago-api:
    image: getlago/api:v1.46.0
    command: ["./scripts/start.api.sh"]
    ports:
      - "3000:3000"
    environment: *lago-env
    depends_on:
      lago-db:
        condition: service_healthy
      lago-migrate:
        condition: service_completed_successfully
      lago-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  lago-worker:
    image: getlago/api:v1.46.0
    command: ["./scripts/start.worker.sh"]
    environment: *lago-env
    depends_on:
      lago-api:
        condition: service_started
    restart: unless-stopped

  lago-clock:
    image: getlago/api:v1.46.0
    command: ["./scripts/start.clock.sh"]
    environment: *lago-env
    depends_on:
      lago-api:
        condition: service_started
    restart: unless-stopped

  lago-front:
    image: getlago/front:v1.46.0
    ports:
      - "8081:8080"
    environment:
      API_URL: http://localhost:3000
      APP_ENV: production
      LAGO_DISABLE_PDF_GENERATION: "true"
    depends_on:
      - lago-api
    restart: unless-stopped

volumes:
  ollama_data:
  bifrost_data:
  lago_db:
  lago_redis:
